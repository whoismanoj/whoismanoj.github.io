- title: Research Areas
  type: list
  contents:
  - My research focuses on deep reinforcement learning and its application in the field of supply chain optimization.
  - Some of the state-of-the-art algorithms in deep reinforcement learning are PPO, SAC, DQN etc.
  - I am also interested in Artificial Intelligence for Education.
  

